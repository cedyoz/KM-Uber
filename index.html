<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KM Uber">
<meta name="theme-color" content="#0f0f0f">
<title>KM Uber</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888;
    --accent: #1DB954; --accent-dim: rgba(29,185,84,0.12);
    --red: #E24B4A; --radius: 16px; --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  html, body { height: 100%; background: var(--bg); }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    max-width: 430px; margin: 0 auto;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 20px);
    overflow-x: hidden;
  }
  .header {
    padding: 16px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 32px; height: 32px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-date { font-size: 12px; color: var(--muted); text-align: right; }
  .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px 20px; }
  .stat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 11px 12px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .stat-value { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
  .stat-value.green { color: var(--accent); }
  .stat-unit { font-size: 11px; color: var(--muted); font-weight: 400; }
  .add-section { padding: 0 20px 16px; }
  .section-title { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 9px; text-transform: uppercase; letter-spacing: 0.6px; }
  .form-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-group { flex: 1; }
  .form-label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
  .form-input {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    font-size: 16px; color: var(--text); font-family: inherit;
    outline: none; -webkit-appearance: none; appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: #444; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
  .btn-add {
    width: 100%; background: var(--accent); color: #000;
    border: none; border-radius: var(--radius-sm);
    padding: 14px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    margin-top: 4px;
  }
  .btn-add:active { opacity: 0.75; transform: scale(0.98); }
  .separator { height: 0.5px; background: var(--border); margin: 0 20px 16px; }
  .export-section { padding: 0 20px 16px; }
  .btn-export {
    width: 100%; background: var(--surface); color: var(--text);
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 13px; font-size: 14px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-export:active { opacity: 0.6; }
  .list-section { padding: 0 20px; }
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .btn-clear { font-size: 12px; color: var(--red); background: none; border: none; font-family: inherit; cursor: pointer; }
  .entry-item {
    background: var(--surface); border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); padding: 12px 14px;
    margin-bottom: 7px; display: flex; align-items: center; gap: 10px;
  }
  .entry-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .entry-left { flex: 1; min-width: 0; }
  .entry-note { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-km { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .entry-km-unit { font-size: 10px; color: var(--muted); }
  .entry-del { background: none; border: none; color: #444; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .entry-del:active { color: var(--red); }
  .empty-state { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface); color: var(--text); border: 0.5px solid var(--border);
    padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.green { background: var(--accent); color: #000; border-color: var(--accent); }
  .toast.red { background: var(--red); color: #fff; border-color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-dot">🚗</div>
    <div>
      <h1>KM Uber</h1>
      <div class="header-sub">Suivi kilométrique</div>
    </div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">Aujourd'hui</div>
    <div class="stat-value green" id="todayKm">0<span class="stat-unit"> km</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Ce mois</div>
    <div class="stat-value" id="monthKm">0<span class="stat-unit"> km</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Total</div>
    <div class="stat-value" id="totalKm">0<span class="stat-unit"> km</span></div>
  </div>
</div>

<div class="add-section">
  <p class="section-title">Nouveau trajet</p>
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="kmInput">Kilomètres</label>
        <input type="number" class="form-input" id="kmInput" placeholder="0.0" inputmode="decimal" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label" for="dateInput">Date</label>
        <input type="date" class="form-input" id="dateInput">
      </div>
    </div>
    <div class="form-row" style="margin-bottom:0">
      <div class="form-group">
        <label class="form-label" for="noteInput">Note</label>
        <input type="text" class="form-input" id="noteInput" placeholder="aéroport, soirée, centre-ville...">
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">＋ &nbsp;Enregistrer</button>
  </div>
</div>

<div class="separator"></div>

<div class="export-section">
  <button class="btn-export" onclick="exportCSV()">⬇ Exporter CSV → Google Sheets</button>
</div>

<div class="list-section">
  <div class="list-header">
    <p class="section-title" style="margin-bottom:0">Historique</p>
    <button class="btn-clear" onclick="clearAll()">Tout effacer</button>
  </div>
  <div id="entriesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let entries = JSON.parse(localStorage.getItem('uberkm_simple') || '[]');

  function today() { return new Date().toISOString().split('T')[0]; }

  function formatDate(d) {
    const [y,m,day] = d.split('-');
    const months = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
    return parseInt(day) + ' ' + months[parseInt(m)-1] + ' ' + y;
  }

  function save() { localStorage.setItem('uberkm_simple', JSON.stringify(entries)); }

  let toastTimer;
  function showToast(msg, type) {
    clearTimeout(toastTimer);
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type||'') + ' show';
    toastTimer = setTimeout(() => { t.className = 'toast '+(type||''); }, 2200);
  }

  function updateStats() {
    const now = today();
    const [y,m] = now.split('-');
    let d=0, mo=0, tot=0;
    entries.forEach(e => {
      tot += e.km;
      if (e.date === now) d += e.km;
      if (e.date.startsWith(y+'-'+m)) mo += e.km;
    });
    document.getElementById('todayKm').innerHTML = parseFloat(d.toFixed(1))+'<span class="stat-unit"> km</span>';
    document.getElementById('monthKm').innerHTML = parseFloat(mo.toFixed(1))+'<span class="stat-unit"> km</span>';
    document.getElementById('totalKm').innerHTML = parseFloat(tot.toFixed(1))+'<span class="stat-unit"> km</span>';
  }

  function renderList() {
    const list = document.getElementById('entriesList');
    const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    if (!sorted.length) {
      list.innerHTML = '<div class="empty-state"><div style="font-size:40px;opacity:0.2;margin-bottom:10px">🛣️</div>Aucun trajet enregistré</div>';
      return;
    }
    list.innerHTML = sorted.map(e => `
      <div class="entry-item">
        <div class="entry-icon">🚗</div>
        <div class="entry-left">
          <div class="entry-note">${e.note || 'Trajet Uber'}</div>
          <div class="entry-date">${formatDate(e.date)}</div>
        </div>
        <div class="entry-right">
          <div class="entry-km">${parseFloat(e.km.toFixed(1))}<span class="entry-km-unit"> km</span></div>
        </div>
        <button class="entry-del" onclick="deleteEntry('${e.id}')" aria-label="Supprimer">×</button>
      </div>
    `).join('');
  }

  function addEntry() {
    const km = parseFloat(document.getElementById('kmInput').value);
    const date = document.getElementById('dateInput').value;
    const note = document.getElementById('noteInput').value.trim();
    if (!km || km <= 0) { showToast('Entre un nombre de km valide', 'red'); return; }
    if (!date) { showToast('Sélectionne une date', 'red'); return; }
    entries.push({ id: Date.now().toString(), km, date, note });
    save();
    document.getElementById('kmInput').value = '';
    document.getElementById('noteInput').value = '';
    updateStats(); renderList();
    showToast(parseFloat(km.toFixed(1)) + ' km enregistrés ✓', 'green');
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save(); updateStats(); renderList();
  }

  function clearAll() {
    if (!entries.length) return;
    if (confirm('Effacer tous les trajets ? Irréversible.')) {
      entries = []; save(); updateStats(); renderList();
      showToast('Historique effacé');
    }
  }

  function exportCSV() {
    if (!entries.length) { showToast('Aucun trajet à exporter', 'red'); return; }
    const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
    const header = 'Date,Description,Catégorie,Kilométrage\n';
    const rows = sorted.map(e =>
      `${e.date},${e.note||'Trajet Uber'},Transport,${e.km.toFixed(1)}`
    ).join('\n');
    const blob = new Blob(['\uFEFF'+header+rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'uber-km-'+today()+'.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('CSV exporté ✓', 'green');
  }

  const d = new Date();
  document.getElementById('dateInput').value = today();
  document.getElementById('headerDate').textContent = d.toLocaleDateString('fr-CA', { weekday:'short', day:'numeric', month:'short' });
  updateStats();
  renderList();
</script>
</body>
</html>
